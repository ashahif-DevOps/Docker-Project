# ===== MySQL Connection =====
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Loads data.sql once on first run to seed your resume data.
# Set to 'never' after first successful run to avoid duplicate rows.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===== Server =====
server.port=8080

# ===== CORS handled in WebConfig.java (allows Angular dev server) =====
